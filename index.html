<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lindu Aji Kabupaten Semarang</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/images/logo.png" type="image/png" />
  <link rel="shortcut icon" href="assets/images/logo.png" />
  <link rel="apple-touch-icon" href="assets/images/logo.png" />

  <!-- Font & Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      text-align: center;
      background: #000;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .logo {
      width: 100px;
      margin-bottom: 1rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin: 2rem auto;
      width: 100%;
      max-width: 320px;
    }

    .cta-button {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #ffd700, #f7c600);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    /* REVIEW */
    .review-section {
      margin-top: 2rem;
      width: 100%;
      max-width: 350px;
      background: rgba(255, 215, 0, 0.05);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    }

    .stars i {
      font-size: 1.5rem;
      color: #555;
      cursor: pointer;
    }

    .stars i.active {
      color: #ffd700;
    }

    textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .submit-review {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #ffd700;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      margin-top: 2rem;
      padding: 2rem;
      color: #888;
    }

    .social-icons a {
      color: #ffd700;
      margin: 0 10px;
      font-size: 1.5rem;
    }

  </style>
</head>

<body>

<canvas id="starCanvas"></canvas>

<div class="wrapper">
  <img src="assets/images/logo.png" class="logo">
  <h1>Lindu Aji Kabupaten Semarang</h1>
  <h3>Organisasi Masyarakat</h3>

  <div class="buttons">
    <a href="#"><button class="cta-button">Tentang Kami</button></a>
    <a href="#"><button class="cta-button">Gallery</button></a>
    <a href="#"><button class="cta-button">Pendaftaran</button></a>
    <a href="#"><button class="cta-button">Berita</button></a>
    <a href="#"><button class="cta-button">Informasi</button></a>
  </div>

  <!-- REVIEW -->
  <div class="review-section">
    <h2>Berikan Ulasan</h2>

    <div class="stars" id="stars">
      <i class="fa fa-star" data="1"></i>
      <i class="fa fa-star" data="2"></i>
      <i class="fa fa-star" data="3"></i>
      <i class="fa fa-star" data="4"></i>
      <i class="fa fa-star" data="5"></i>
    </div>

    <textarea id="comment" placeholder="Tulis komentar..."></textarea>
    <button class="submit-review" onclick="kirim()">Kirim</button>

    <p id="hasil"></p>
  </div>
</div>

<footer>
  <h3>Hubungi kami</h3>
  <div class="social-icons">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-youtube"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
  </div>
</footer>

<script>
/* BINTANG */
const canvas = document.getElementById("starCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random()
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ffd700";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    s.y += s.d;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* RATING */
let rating = 0;
const starEls = document.querySelectorAll("#stars i");

starEls.forEach((s, i) => {
  s.onclick = () => {
    rating = i + 1;
    starEls.forEach(el => el.classList.remove("active"));
    for (let j = 0; j < rating; j++) {
      starEls[j].classList.add("active");
    }
  };
});

/* SUBMIT */
function kirim() {
  let komentar = document.getElementById("comment").value;
  let hasil = document.getElementById("hasil");

  if (rating === 0 || komentar === "") {
    hasil.innerText = "Isi dulu rating & komentar!";
    hasil.style.color = "red";
  } else {
    hasil.innerText = "Terima kasih atas ulasan ⭐";
    hasil.style.color = "#ffd700";
    document.getElementById("comment").value = "";
    starEls.forEach(el => el.classList.remove("active"));
    rating = 0;
  }
}
</script>

</body>
</html>
